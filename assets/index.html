<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería de superheroes</title>

    <link rel="stylesheet" href="/assets/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <div
        class="text-center bg-dark text-warning card border-warning py-2 border-5 border-bottom-0"
      >
        <h1>Galería de superheroes</h1>
        <p>Encuentre a su personaje favorito y descubra más de el:</p>
      </div>
    </header>

    <main class="container">
      <div class="row d-flex justify-content-around">
        <div
          class="d-flex col-5 text-center border my-3 py-3 flex-column justify-content-center align-items-center"
        >
          <h2>Agregado de Personaje</h2>
          <form id="formulario">
            <input type="text" id="nombre" placeholder="Nombre" />
            <input type="text" id="imagen" placeholder="URL Imágen" /><br />
            <button type="submit" class="my-3 btn btn-warning">
              Cargar personaje
            </button>
          </form>
        </div>

        <div
          class="d-flex col-5 text-center my-3 py-3 border flex-column justify-content-center align-items-center"
        >
          <h2>Busca tu personaje</h2>
          <input type="text" id="filtroNombre" placeholder="Buscar..." />
          <button id="btnFiltrar" class="btn btn-dark text-warning my-3">
            Buscar
          </button>
        </div>
      </div>

      <div class="row mt-2" id="rowContainer"></div>
    </main>

    <footer
      class="p-3 bg-dark fw-bold text-warning border border-warning border-5 border-top-0"
    >
      ©Derechos reservados
    </footer>

    <script src="/assets/js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
